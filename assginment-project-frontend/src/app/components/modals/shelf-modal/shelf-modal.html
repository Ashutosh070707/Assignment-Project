<div class="modal-overlay">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Add New Shelf</h3>
      <button type="button" class="close-btn" (click)="closeModal()">&#10005;</button>
    </div>
    @if (errorMessage()) {
      <div class="error-banner">
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="shelfForm" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <div class="form-group">
          <label>Shelf Name</label>
          <input
            type="text"
            formControlName="shelfName"
            class="form-input"
            placeholder="e.g., Processing Shelf"
          />
        </div>
        <div class="form-group">
          <label>Part Number</label>
          <input
            type="text"
            formControlName="partNumber"
            class="form-input"
            placeholder="e.g., SH-999"
          />
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-cancel"
          (click)="closeModal()"
          [disabled]="isSubmitting()"
        >
          Cancel
        </button>

        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="shelfForm.invalid || isSubmitting()"
        >
          @if (isSubmitting()) {
            <span class="btn-spinner"></span> Adding...
          } @else {
            Add Shelf
          }
        </button>
      </div>
    </form>
  </div>
</div>
