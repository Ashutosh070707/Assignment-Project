<div class="modal-overlay">
  <div class="modal-container" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h3>Add Shelf Position</h3>
      <button type="button" class="close-btn" (click)="closeModal()">&#10005;</button>
    </div>

    <form [formGroup]="positionForm" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        
        <div class="form-group">
          <label>Shelf Position ID</label>
          <input type="text" formControlName="id" class="form-input" placeholder="e.g., sp-05">
        </div>
        
        <div class="form-group">
          <label>Assign to Shelf (Optional)</label>
          <select formControlName="assignedShelf" class="form-input">
            <option value="">-- Leave Empty --</option>
            <option value="sh-01">Main-Processing-Shelf</option>
            <option value="sh-03">Power-Distribution-Shelf</option>
          </select>
        </div>
      </div>

      @if (errorMessage()) {
        <div class="error-banner">
          {{ errorMessage() }}
        </div>
      }

      <div class="modal-footer">
        <button type="button" class="btn btn-cancel" (click)="closeModal()" [disabled]="isSubmitting()">Cancel</button>
        
        <button type="submit" class="btn btn-primary" [disabled]="positionForm.invalid || isSubmitting()">
          @if (isSubmitting()) {
            <span class="btn-spinner"></span> Adding...
          } @else {
            Add Position
          }
        </button>
      </div>
    </form>

  </div>
</div>
